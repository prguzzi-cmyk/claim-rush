<p class="mat-headline-4 section-title">Order History</p>
<ul class="breadcrumb">
    <li class="breadcrumb-item">
        <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')"><mat-icon>home</mat-icon></a>
    </li>
    <li class="breadcrumb-item"><a href="javascript:">Order History</a>
    </li>
</ul>

<mat-card appearance="outlined">
    <mat-card-header>
        <mat-card-title>Order History</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <div class="mat-table-scroll-container">
            <table mat-table [dataSource]="orders" class="order-table">

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>#</th>
                    <td mat-cell *matCellDef="let row; let i = index">{{i + 1}}</td>
                </ng-container>

                <ng-container matColumnDef="total_amount">
                    <th mat-header-cell *matHeaderCellDef>Total Amount</th>
                    <td mat-cell *matCellDef="let row">{{row.total_amount}}</td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Order Status</th>
                    <td mat-cell *matCellDef="let row">{{row.status}}</td>
                </ng-container>

                <ng-container matColumnDef="created_at">
                    <th mat-header-cell *matHeaderCellDef>Created</th>
                    <td mat-cell *matCellDef="let row">{{row.created_at|date: 'MMMM dd,
                        yyyy'}}</td>
                </ng-container>

                <ng-container matColumnDef="updated_at">
                    <th mat-header-cell *matHeaderCellDef>Updated</th>
                    <td mat-cell *matCellDef="let row">{{row.updated_at| date: 'MMMM dd,
                        yyyy'}}</td>
                </ng-container>

                <ng-container matColumnDef="view">
                    <th mat-header-cell *matHeaderCellDef>View</th>
                    <td mat-cell *matCellDef="let element">
                        <div>
                            <button mat-icon-button (click)="handleViewDetail(element)"><mat-icon>view_list</mat-icon></button>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>

        <mat-paginator [style.visibility]="orders.length <= 0 ? 'hidden' : 'visible'" #paginator [length]="totalRecords"
            [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions" (page)="changePage($event)">
        </mat-paginator>
    </mat-card-content>
</mat-card>
