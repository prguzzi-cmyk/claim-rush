<p class="mat-headline-4 section-title">Digital Hub</p>
<ul class="breadcrumb">
  <li class="breadcrumb-item">
    <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')">Home</a>
  </li>
  <li class="breadcrumb-item"><a href="javascript:">Digital Hub</a></li>
</ul>

<mat-card appearance="outlined">
  <mat-card-content>
    <div class="row mb-2">
      <div class="col-lg-6 col-sm-12">
        <mat-form-field appearance="outline">
          <mat-label>Category Filter:</mat-label>
          <mat-select [(ngModel)]="selectedCategoryId">
            <mat-option
              *ngFor="let category of categories"
              [value]="category.id"
            >
              {{ category.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <button
          mat-raised-button
          color="primary"
          class="ms-2"
          (click)="handleFilter()"
        >
          Filter
        </button>
      </div>
      <div
        class="col-lg-6 col-sm-12 fw-bold d-flex justify-content-lg-end justify-content-sm-start"
      >
        Credit Balance: {{ account_balance }}
      </div>
    </div>
    <div class="product-list">
      <div class="container">
        <div class="row align-items-end">
          <div class="col-lg-3 col-6 mb-4" *ngFor="let item of products">
            <img [src]="item.product_image" class="product-image" />
            <div clas="p-4">
              <p>{{ item.category_name }}</p>
              <p class="product-name">{{ item.product_name }}</p>
              <p class="price">
                <span class="original-price">{{ item.original_price }}</span>
                <span class="current-price">{{ item.price }}</span>
              </p>
              <div class="">
                <button
                  mat-raised-button
                  color="primary"
                  #addCartButton
                  (click)="addToCart(item, addCartButton)"
                >
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="d-flex flex-column flex-md-row justify-content-between">
      <mat-icon class="shopping-cart mb-4" [routerLink]="'/app/shop/cart'"
        >shopping_cart</mat-icon
      >
      <mat-paginator
        [style.visibility]="products.length <= 0 ? 'hidden' : 'visible'"
        #paginator
        [length]="totalRecords"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (page)="changePage($event)"
      >
      </mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
