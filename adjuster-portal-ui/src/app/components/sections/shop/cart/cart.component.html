<p class="mat-headline-4 section-title">Cart</p>
<ul class="breadcrumb">
    <li class="breadcrumb-item">
        <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')"><mat-icon>home</mat-icon></a>
    </li>
    <li class="breadcrumb-item"><a href="javascript:">Cart</a>
    </li>
</ul>
<mat-card appearance="outlined">
    <mat-card-header>
        <mat-card-title>Shopping Cart</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <div class="mat-table-scroll-container">
            <table mat-table [dataSource]="carts" class="cart-table">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>#</th>
                    <td mat-cell *matCellDef="let element; let i = index">{{i+1}}</td>
                </ng-container>
                <ng-container matColumnDef="product_image">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let element">
                        <img [src]="element.product_image" class="product-image">
                    </td>
                </ng-container>
                <ng-container matColumnDef="product_name">
                    <th mat-header-cell *matHeaderCellDef>Product</th>
                    <td mat-cell *matCellDef="let element">{{element.product_name}}</td>
                </ng-container>
                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef>Price</th>
                    <td mat-cell *matCellDef="let element">
                        {{element.price}}</td>
                </ng-container>
                <ng-container matColumnDef="quantity">
                    <th mat-header-cell *matHeaderCellDef>Quantity</th>
                    <td mat-cell *matCellDef="let element"><input   type="number" placeholder=""
                            [(ngModel)]="element.quantity" min="0" /> 
                    </td>
                </ng-container>
                <ng-container matColumnDef="subtotal">
                    <th mat-header-cell *matHeaderCellDef>Subtotal</th>
                    <td mat-cell *matCellDef="let element">
                        {{element.subtotal}}</td>
                </ng-container>
                <ng-container matColumnDef="delete">
                    <th mat-header-cell *matHeaderCellDef>Delete</th>
                    <td mat-cell *matCellDef="let element">
                        <div>
                            <button mat-icon-button (click)="deleteCart(element)"><mat-icon>delete</mat-icon></button>
                        </div>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </mat-card-content>

    <mat-card-actions>
        <div class="update-cart">
            <button mat-raised-button color="primary" (click)="updateCart()">Update Cart</button>
        </div>
    </mat-card-actions>


    <div class="container ">
        <div class="row">
            <div class="col-lg-6"></div>
            <div class="col-lg-6 cart-totals">
                <mat-card-header>
                    <mat-card-title class="cart-totals-title">Cart totals</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <div class="row cart-totals-item">
                        <div class="col-lg-6">Subtotal</div>
                        <div class="col-lg-6">{{total.toFixed(2)}}</div>
                    </div>
                    <div class="row cart-totals-item">
                        <div class="col-lg-6">Total</div>
                        <div class="col-lg-6">{{total.toFixed(2)}}</div>
                    </div>
                </mat-card-content>

                <mat-card-actions>
                    <div class="update-cart">
                        <button mat-raised-button color="primary" (click)="handleCheckout()" [disabled]="total > account_balance">Proceed to
                            checkout</button>
                    </div>
                </mat-card-actions>
            </div>
        </div>
    </div>
</mat-card>
