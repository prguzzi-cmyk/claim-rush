

<mat-card appearance="outlined" *ngxPermissionsOnly="['super-admin']">
  <div class="row">
    <div class="col-10">
      <p class="mat-headline-4 section-title">Newsletters</p>
<ul class="breadcrumb">
  <li class="breadcrumb-item">
    <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')">Home</a>
  </li>
  <li class="breadcrumb-item"><a
    href="javascript:">Administration</a>
  </li>
  <li class="breadcrumb-item"><a
    href="javascript:">Newsletters</a>
  </li>
</ul>
    </div>
    <div class="col-2 text-end">
      <button mat-mini-fab matTooltip="Add newsletter" color="primary" (click)="openAddDialog()">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>

  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="newsletters-table">

      <ng-container matColumnDef="sn">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let element; let i = index;">{{i+1}}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let newsletter" (click)="openViewDialog(newsletter)">{{newsletter.title}}</td>
      </ng-container>

      <ng-container matColumnDef="publication_date">
        <th mat-header-cell *matHeaderCellDef>Publication date</th>
        <td mat-cell *matCellDef="let newsletter" (click)="openViewDialog(newsletter)">{{newsletter.publication_date |
          date: 'MMMM dd, yyyy'}}</td>
      </ng-container>

      <ng-container matColumnDef="Featured">
        <th mat-header-cell *matHeaderCellDef>Featured</th>
        <td mat-cell *matCellDef="let newsletter" class="last-active-cell">{{ (newsletter.is_featured == 1 ? 'Yes' : 'No')}}</td>
      </ng-container>

      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef>Created at</th>
        <td mat-cell *matCellDef="let newsletter" (click)="openViewDialog(newsletter)">{{newsletter.created_at | date:
          'MMMM dd, yyyy'}}</td>
      </ng-container>

      <ng-container matColumnDef="edit">
        <th mat-header-cell *matHeaderCellDef>Edit</th>
        <td mat-cell *matCellDef="let newsletter">
          <button mat-icon-button [disabled]="!!+newsletter.is_removed" (click)="openEditDialog(newsletter)"
            matTooltip="Edit"><mat-icon>edit</mat-icon></button>
        </td>
      </ng-container>

      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef>Delete</th>
        <td mat-cell *matCellDef="let newsletter">
          <div>
            <button mat-icon-button [disabled]="!newsletter.can_be_removed || !!+newsletter.is_removed"
              (click)="openDeleteDialog(newsletter)"><mat-icon>delete</mat-icon></button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <app-paginator [style.visibility]="dataSource.length <= 0 ? 'hidden' : 'visible'" #paginator
      [totalItems]="totalRecords" (pageChange)="onPageChange($event)"></app-paginator>
  </mat-card-content>

  <mat-card-actions>
  </mat-card-actions>
</mat-card>
