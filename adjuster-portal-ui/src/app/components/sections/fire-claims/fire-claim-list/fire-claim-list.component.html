<mat-card>
  <mat-card-header>
    <div class="header-row">
      <div class="title-section">
        <h2>Fire Claims</h2>
      </div>
      <div class="actions-section">
        <button mat-raised-button color="primary" (click)="onNewClaim()">
          <mat-icon>add</mat-icon> New Fire Claim
        </button>
      </div>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div class="mat-mdc-table-scroll-container">
      <table mat-table [dataSource]="dataSource" class="fire-claim-table">
        <ng-container matColumnDef="loss_date">
          <th mat-header-cell *matHeaderCellDef>Loss Date</th>
          <td mat-cell *matCellDef="let row">
            {{ row.loss_date | date: 'MM/dd/yyyy' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let row">
            {{ row.address_line1 }}, {{ row.city }}, {{ row.state }}
            {{ row.zip }}
          </td>
        </ng-container>

        <ng-container matColumnDef="insured_name">
          <th mat-header-cell *matHeaderCellDef>Insured</th>
          <td mat-cell *matCellDef="let row">{{ row.insured_name }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <span
              class="status-badge"
              [ngClass]="{
                'badge-new': row.status === 'new',
                'badge-complete': row.status === 'intake_complete'
              }"
            >
              {{ getStatusLabel(row.status) }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="created_at">
          <th mat-header-cell *matHeaderCellDef>Created</th>
          <td mat-cell *matCellDef="let row">
            {{ row.created_at | date: 'MM/dd/yyyy' }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          (click)="onRowClick(row)"
          class="clickable-row"
        ></tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalRecords"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 25, 50]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    ></mat-paginator>
  </mat-card-content>
</mat-card>
