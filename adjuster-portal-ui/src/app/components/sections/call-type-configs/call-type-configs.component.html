<div class="config-wrapper">
  <div class="page-header">
    <h2>Call Type Configuration</h2>
    <p class="subtitle">Enable or disable call types to control which incidents appear in the RIN feed.</p>
  </div>

  <div *ngIf="isLoading" class="loading-row">
    <mat-progress-spinner diameter="32" mode="indeterminate"></mat-progress-spinner>
    <span>Loading call type configs...</span>
  </div>

  <div class="table-container" *ngIf="!isLoading">
    <table mat-table [dataSource]="dataSource" class="configs-table">

      <!-- Sort Order Column -->
      <ng-container matColumnDef="sort_order">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let config">{{ config.sort_order + 1 }}</td>
      </ng-container>

      <!-- Code Column -->
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let config">
          <span class="call-badge" [ngClass]="getCallTypeBadgeClass(config.code)">
            {{ config.code }}
          </span>
        </td>
      </ng-container>

      <!-- Description Column -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let config">{{ config.description }}</td>
      </ng-container>

      <!-- Enabled Toggle Column -->
      <ng-container matColumnDef="is_enabled">
        <th mat-header-cell *matHeaderCellDef>Enabled</th>
        <td mat-cell *matCellDef="let config">
          <mat-slide-toggle
            [checked]="config.is_enabled"
            (change)="onToggle(config)"
            color="primary"
          ></mat-slide-toggle>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          <mat-icon>info_outline</mat-icon>
          No call type configurations found.
        </td>
      </tr>
    </table>
  </div>
</div>
