
<mat-card appearance="outlined" *ngxPermissionsOnly="['super-admin']">
  <div class="row">
    <div class="col-10">
      <p class="mat-headline-4 section-title">Templates</p>
<ul class="breadcrumb">
  <li class="breadcrumb-item">
    <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')">Home</a>
  </li>
  <li class="breadcrumb-item"><a
    href="javascript:">Administration</a>
  </li>
  <li class="breadcrumb-item"><a
    href="javascript:">Templates</a>
  </li>
</ul>
    </div>
    <div class="col-2 text-end">
      <button mat-mini-fab matTooltip="Add a new template" color="primary" [hidden]="!userService.getUserPermissions('template_file','create')"  (click)="openAddTemplateDialog()">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="template-table">
      <ng-container matColumnDef="sn">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let t">
          <a  href="javascript:void(0)" (click)="openViewTemplateDialog(t);">{{ t.name }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let t">
          {{ t.description }}
        </td>
      </ng-container>

      <ng-container matColumnDef="state">
        <th mat-header-cell *matHeaderCellDef>State</th>
        <td mat-cell *matCellDef="let t">
          {{ (t.state === "NULL" ? 'ALL' : t.state) }}
        </td>
      </ng-container>

      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let t" class="expiry-date-cell">
          {{ t.created_at | date : "MMMM dd, yyyy" }}
        </td>
      </ng-container>

      <ng-container matColumnDef="updated_at">
        <th mat-header-cell *matHeaderCellDef>Last updated</th>
        <td mat-cell *matCellDef="let t" class="last-active-cell">
          <span *ngIf="!t.updated_at">-</span>{{ t.updated_at | date : "MMMM dd, yyyy" }}
        </td>
      </ng-container>


      <ng-container matColumnDef="edit" class="text-right">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t">
        <button mat-icon-button (click)="openFile(t.path, t.type)"
            matTooltip="View document"><mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button (click)="openEditTemplateDialog(t)"
            [hidden]="!userService.getUserPermissions('template_file','update')"
            matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button color="warn" mat-icon-button [disabled]="!t.can_be_removed || !!+t.is_removed"
              [hidden]="!userService.getUserPermissions('template_file','remove')"
              (click)="openDeleteTemplateDialog(t)">
              <mat-icon>delete</mat-icon>
            </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [style.visibility]="dataSource.length <= 0 ? 'hidden' : 'visible'" #paginator
      [length]="totalRecords" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions">
    </mat-paginator>

  </mat-card-content>

  <mat-card-actions>

  </mat-card-actions>
</mat-card>
<ngx-spinner type="ball-scale-multiple"></ngx-spinner>
