<mat-card appearance="outlined">
    <form (ngSubmit)="register()">
      <header>
          <div class="logo">
          </div>
          <p class="mat-h2 title">RIN&trade;</p>
      </header>

      <mat-card-content>
        <div class="registration-form" *ngIf="tokenError == null && !this.reset">
            <p>Please reset your password below.</p>
          <div class="registration-field">
            <mat-icon color="accent">vpn_key</mat-icon>
            <mat-form-field color="accent">
                <input matInput placeholder="Password" name="password" type="password" [disabled]="!tokenChecked" minlength="8" required [(ngModel)]="credentials.password">
              </mat-form-field>
          </div>

          <div class="registration-field">
            <mat-icon color="accent">vpn_key</mat-icon>
            <mat-form-field color="accent">
              <input matInput placeholder="Repeat Password" name="passwordRepeat" type="password" [disabled]="!tokenChecked" minlength="8" required [(ngModel)]="credentials.passwordRepeat">
            </mat-form-field>
          </div>
        </div>

        <div class="error-message" *ngIf="!this.reset && (tokenError != null || !passwordsMatch)">
            <span *ngIf="tokenError == 'not-found' || tokenError == 'invalid'">Incorrect reset link</span>
            <span *ngIf="tokenError == 'expired'">Link expired</span>
            <span *ngIf="passwordsMatch == false">Passwords need to match</span>
        </div>

        <div class="registered" *ngIf="this.reset">
            Password successfully reset. Proceed to login.
        </div>
    </mat-card-content>

    <mat-card-actions *ngIf="tokenError == null">
        <button mat-raised-button color="primary" routerLink="/login" *ngIf="this.reset">Login</button>
        <button mat-raised-button color="primary" [disabled]="resetDisabled || !tokenChecked" *ngIf="!this.reset"><div class="spinner-container"><mat-spinner diameter="25" *ngIf="resetDisabled"></mat-spinner></div>
          Reset password</button>
      </mat-card-actions>
    </form>
  </mat-card>
