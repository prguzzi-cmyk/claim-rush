<h2 mat-dialog-title>Org Chart</h2>
<mat-dialog-content class="team-structure-content">
    <img *ngIf="data.teamStructureImgUrl" src="{{data?.teamStructureImgUrl}}" alt="Team Structure" class="team-structure-image">
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
