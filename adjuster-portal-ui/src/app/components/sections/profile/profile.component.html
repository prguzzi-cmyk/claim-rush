
<mat-card appearance="outlined">
  <div class="row">
    <div class="col-10">
      <p class="mat-headline-4 section-title">My Profile</p>
      <ul class="breadcrumb">
        <li class="breadcrumb-item">
          <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')">Home</a>
        </li>
        <li class="breadcrumb-item"><a
          href="javascript:">Profile</a>
        </li>
      </ul>

    </div>
    <div class="col-2 text-end">
      <button mat-mini-fab color="primary" class="m-1" matTooltip="Upload my files" matTooltipPosition="below"
              (click)="addUserPersonalFile(user)">
          <mat-icon>upload_file</mat-icon>
      </button>
  </div>

  </div>

  <mat-card-content>
    <mat-form-field>
      <input matInput placeholder="First name" disabled value="{{user.first_name}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Last name" disabled value="{{user.last_name}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Email address" disabled value="{{user.email}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Phone number" disabled value="{{user.user_meta?.phone_number}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Phone number extension" disabled value="{{user.user_meta?.phone_number_extension}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Address" disabled value="{{user.user_meta?.address}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="City" disabled value="{{user.user_meta?.city}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="State" disabled value="{{user.user_meta?.state}}">
    </mat-form-field>

    <mat-form-field>
      <input matInput placeholder="Zipcode" disabled value="{{user.user_meta?.zip_code}}">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Operating Mode</mat-label>
      <input matInput disabled [value]="user.operating_mode === 'aci' ? 'ACI Adjuster Mode' : user.operating_mode === 'upa' ? 'UPA Advocacy Mode' : 'Neutral (RIN Standard)'">
    </mat-form-field>

          <!-- File List Section -->
          <p class="mat-display-1 section-title">My Personal Documents</p>
          <div class="file-list mt-4">
              <div *ngIf="userPersonalFiles?.length > 0; else noDataTemplate">
                  <table mat-table [dataSource]="userPersonalFiles" class="mat-elevation-z8 custom-table">
                      <!-- Serial Number Column -->
                      <ng-container matColumnDef="sn">
                          <th mat-header-cell *matHeaderCellDef>#</th>
                          <td mat-cell *matCellDef="let element; let i = index;">{{ i + 1 }}</td>
                      </ng-container>
    
                      <!-- File Name Column -->
                      <ng-container matColumnDef="name">
                          <th mat-header-cell *matHeaderCellDef>File Name</th>
                          <td mat-cell *matCellDef="let file">{{ file.name }}</td>
                      </ng-container>
    
                      <!-- File Size Column -->
                      <ng-container matColumnDef="size">
                          <th mat-header-cell *matHeaderCellDef>File Size</th>
                          <td mat-cell *matCellDef="let file">{{ file.size | filesize }}</td>
                      </ng-container>
    
                      <!-- State Column -->
                      <ng-container matColumnDef="state">
                          <th mat-header-cell *matHeaderCellDef>State</th>
                          <td mat-cell *matCellDef="let file">{{ file?.state }}</td>
                      </ng-container>
    
                      <!-- Expiration Date Column -->
                      <ng-container matColumnDef="expiration_date">
                          <th mat-header-cell *matHeaderCellDef>Expiration Date</th>
                          <td mat-cell *matCellDef="let file">{{ file?.expiration_date }}</td>
                      </ng-container>
    
                      <!-- Download Column -->
                      <ng-container matColumnDef="download">
                          <th mat-header-cell *matHeaderCellDef>View Content</th>
                          <td mat-cell *matCellDef="let file">
                              <button mat-icon-button (click)="previewFile(file)" matTooltip="View Content">
                                  <mat-icon>visibility</mat-icon>
                              </button>
                          </td>
                      </ng-container>
    
                      <!-- Delete Column -->
                      <ng-container matColumnDef="delete">
                          <th mat-header-cell *matHeaderCellDef>Delete</th>
                          <td mat-cell *matCellDef="let file">
                              <button mat-icon-button [disabled]="!file.can_be_removed" (click)="openFileDeleteDialog(file)" matTooltip="Delete">
                                  <mat-icon>delete</mat-icon>
                              </button>
                          </td>
                      </ng-container>
    
                      <!-- Header and Rows -->
                      <tr mat-header-row *matHeaderRowDef="displayedColumnsFiles"></tr>
                      <tr mat-row *matRowDef="let row; columns: displayedColumnsFiles;"></tr>
                  </table>
              </div>
    
              <!-- No Data Message -->
              <ng-template #noDataTemplate>
                  <div class="no-data-message">
                      <mat-icon>folder_off</mat-icon>
                      <p>No documents found. Upload a file to get started.</p>
                  </div>
              </ng-template>
          </div>
    

  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="openPasswordChangeDialog()">Change password</button>
    <button mat-raised-button color="primary" (click)="openUserEditDialog()">Edit</button>
  </mat-card-actions>
</mat-card>
