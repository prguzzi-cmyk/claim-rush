
<mat-card appearance="outlined">
  <div class="row">
    <div class="col-10"><p class="mat-headline-4 section-title">Admin tasks</p>
      <ul class="breadcrumb">
        <li class="breadcrumb-item">
          <a [routerLink]="['/app/dashboard']">Home</a>
        </li>
        <li class="breadcrumb-item"><a
          href="javascript:">Admin tasks</a>
        </li>
        
      </ul>
    </div>
    <div class="col-2 text-end">

    </div>
  </div>

  <mat-card-content>
    <table mat-table [dataSource]="tasks" class="table-width">

      <ng-container matColumnDef="sn">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let element; let i = index;">{{i+1}}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let element" (click)="openTaskViewDialog(element)">{{element.title}}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element" (click)="openTaskViewDialog(element)"><strong>{{removeStyleTags(element.description)}}</strong></td>
      </ng-container>

      <ng-container matColumnDef="estimated_duration">
        <th mat-header-cell *matHeaderCellDef>Duration</th>
        <td mat-cell *matCellDef="let element" (click)="openTaskDialog(element)">{{element.estimated_duration}}</td>
      </ng-container>

      <ng-container matColumnDef="is_active">
        <th mat-header-cell *matHeaderCellDef>Active</th>
        <td mat-cell *matCellDef="let element">
          <div>
            <mat-slide-toggle [checked]="!!+element.is_active" disabled color="primary"></mat-slide-toggle>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="can_be_removed">
        <th mat-header-cell *matHeaderCellDef>Removed</th>
        <td mat-cell *matCellDef="let element">
            <mat-slide-toggle [checked]="!!+element.can_be_removed" disabled color="primary"></mat-slide-toggle>
        </td>
      </ng-container>

      <ng-container matColumnDef="edit">
        <th mat-header-cell *matHeaderCellDef>Edit</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="editTask(element)"
            matTooltip="Edit {{element.title}}"><mat-icon>edit</mat-icon></button>
        </td>
      </ng-container>

      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef>Delete</th>
        <td mat-cell *matCellDef="let element">
          <div>
            <button mat-icon-button [disabled]="!element.can_be_removed || !!+element.is_removed"  matTooltip="Delete {{element.title}}"
              (click)="openTaskDeleteDialog(element)"><mat-icon>delete</mat-icon></button>
          </div>
        </td>
      </ng-container>

       <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator #paginator [length]="totalRecords" [pageSize]="pageSize"
            [pageSizeOptions]="pageSizeOptions" (page)="changePage($event)">
          </mat-paginator>
  </mat-card-content>

  <mat-card-actions>
      <button mat-raised-button color="primary" (click)="addTask()" >Add new Task</button>
    </mat-card-actions>
</mat-card>
