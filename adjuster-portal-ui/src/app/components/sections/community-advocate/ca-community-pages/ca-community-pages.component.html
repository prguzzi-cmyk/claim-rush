<div class="ca-tab-content">
  <div class="toolbar">
    <h3>Community Pages</h3>
    <button mat-raised-button color="primary" (click)="openEditor()">
      <mat-icon>add</mat-icon> New Page
    </button>
  </div>

  <!-- Page Cards Grid -->
  <div class="page-grid" *ngIf="!showEditor">
    <mat-card *ngFor="let page of pages" class="page-card">
      <mat-card-header>
        <mat-card-title>{{ page.title }}</mat-card-title>
        <mat-card-subtitle>{{ page.advocate_name }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="page-stats">
          <span><mat-icon>visibility</mat-icon> {{ page.views | number }}</span>
          <span><mat-icon>person_add</mat-icon> {{ page.leads_generated }}</span>
        </div>
        <div class="page-slug">/{{ page.slug }}</div>
      </mat-card-content>
      <mat-card-actions>
        <mat-slide-toggle [checked]="page.is_published" (change)="togglePublish(page)">
          {{ page.is_published ? 'Published' : 'Draft' }}
        </mat-slide-toggle>
        <span class="spacer"></span>
        <button mat-icon-button (click)="openEditor(page)" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
      </mat-card-actions>
    </mat-card>
  </div>

  <!-- Page Editor -->
  <mat-card *ngIf="showEditor" class="editor-card">
    <mat-card-header>
      <mat-card-title>{{ editingPage ? 'Edit' : 'New' }} Community Page</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Page Title</mat-label>
          <input matInput [(ngModel)]="pageForm.title">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>URL Slug</mat-label>
          <input matInput [(ngModel)]="pageForm.slug">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Advocate Name</mat-label>
          <input matInput [(ngModel)]="pageForm.advocate_name">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Content (HTML)</mat-label>
          <textarea matInput [(ngModel)]="pageForm.content" rows="10"></textarea>
        </mat-form-field>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="closeEditor()">Cancel</button>
      <button mat-raised-button color="primary" (click)="savePage()">Save Page</button>
    </mat-card-actions>
  </mat-card>
</div>
