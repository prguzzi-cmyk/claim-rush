<p class="mat-headline-4 section-title">Account Balance</p>
<ul class="breadcrumb">
    <li class="breadcrumb-item">
        <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')"><mat-icon>home</mat-icon></a>
    </li>
    <li class="breadcrumb-item"><a href="javascript:">Administration</a>
    </li>
    <li class="breadcrumb-item"><a href="javascript:">Credit Balance</a>
    </li>
</ul>

<mat-card appearance="outlined" *ngxPermissionsOnly="['super-admin','admin']">
    <mat-card-header>
        <mat-card-title>Manage Credit Balance</mat-card-title>
        <button mat-raised-button color="primary" (click)="handleAddCredit()">Add Credit</button>
    </mat-card-header>

    <mat-card-content>
        <div class="mat-table-scroll-container">
            <table mat-table [dataSource]="accounts" class="account-table">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>#</th>
                    <td mat-cell *matCellDef="let row; let i = index">{{i+1}}</td>
                </ng-container>

                <ng-container matColumnDef="user_name">
                    <th mat-header-cell *matHeaderCellDef>User Name</th>
                    <td mat-cell *matCellDef="let row">{{row.user_name}}</td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Email</th>
                    <td mat-cell *matCellDef="let row">{{row.email}}</td>
                </ng-container>

                <ng-container matColumnDef="account_balance">
                    <th mat-header-cell *matHeaderCellDef>Credit Balance</th>
                    <td mat-cell *matCellDef="let row">{{row.account_balance}}</td>
                </ng-container>

                <ng-container matColumnDef="created_at">
                    <th mat-header-cell *matHeaderCellDef>Created</th>
                    <td mat-cell *matCellDef="let row">{{row.created_at|date: 'MMMM dd,
                        yyyy'}}</td>
                </ng-container>

                <ng-container matColumnDef="updated_at">
                    <th mat-header-cell *matHeaderCellDef>Updated</th>
                    <td mat-cell *matCellDef="let row">{{row.updated_at| date: 'MMMM dd,
                        yyyy'}}</td>
                </ng-container>

                <ng-container matColumnDef="view">
                    <th mat-header-cell *matHeaderCellDef>View</th>
                    <td mat-cell *matCellDef="let row">
                        <button mat-icon-button
                            (click)="handleViewCreditHistory(row.id)"><mat-icon>view_list</mat-icon></button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>

        <mat-paginator [style.visibility]="accounts.length <= 0 ? 'hidden' : 'visible'" #paginator
            [length]="totalRecords" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions"
            (page)="changePage($event)">
        </mat-paginator>
    </mat-card-content>
</mat-card>
