<p class="mat-headline-4 section-title">Categories</p>
<ul class="breadcrumb">
    <li class="breadcrumb-item">
        <a [routerLink]="['/app/dashboard']" (click)="onNavigate('Dashboard')"><mat-icon>home</mat-icon></a>
    </li>
    <li class="breadcrumb-item"><a href="javascript:">Administration</a>
    </li>
    <li class="breadcrumb-item"><a href="javascript:">Categories</a>
    </li>
</ul>
<mat-card appearance="outlined" *ngxPermissionsOnly="['super-admin','admin']">
    <mat-card-header>
        <mat-card-title>Manage Categories</mat-card-title>
        <button mat-raised-button color="primary" (click)="openCategoryAddDialog()">Add Category</button>
    </mat-card-header>

    <mat-card-content>
        <div class="mat-table-scroll-container">
            <table mat-table [dataSource]="categories" class="category-table">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>#</th>
                    <td mat-cell *matCellDef="let cate; let i = index">{{i+1}}</td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Name</th>
                    <td mat-cell *matCellDef="let cate">{{cate.name}}</td>
                </ng-container>

                <ng-container matColumnDef="parent_id">
                    <th mat-header-cell *matHeaderCellDef>Parent Category</th>
                    <td mat-cell *matCellDef="let cate">{{cate.parent_path}}</td>
                </ng-container>

                <ng-container matColumnDef="created_at">
                    <th mat-header-cell *matHeaderCellDef>Created</th>
                    <td mat-cell *matCellDef="let cate">{{cate.created_at|date: 'MMMM dd,
                        yyyy'}}</td>
                </ng-container>

                <ng-container matColumnDef="updated_at">
                    <th mat-header-cell *matHeaderCellDef>Updated</th>
                    <td mat-cell *matCellDef="let cate">{{cate.updated_at| date: 'MMMM dd,
                        yyyy'}}</td>
                </ng-container>

                <ng-container matColumnDef="edit">
                    <th mat-header-cell *matHeaderCellDef>Edit</th>
                    <td mat-cell *matCellDef="let cate">
                        <button mat-icon-button
                            (click)="openCategoryEditDialog(cate)"><mat-icon>edit</mat-icon></button>
                    </td>
                </ng-container>

                <ng-container matColumnDef="delete">
                    <th mat-header-cell *matHeaderCellDef>Delete</th>
                    <td mat-cell *matCellDef="let cate">
                        <div>
                            <button mat-icon-button
                                (click)="openCategoryDeleteDialog(cate)"><mat-icon>delete</mat-icon></button>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>

        <mat-paginator [style.visibility]="dataSource.length <= 0 ? 'hidden' : 'visible'" #paginator
            [length]="totalRecords" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions"
            (page)="changePage($event)">
        </mat-paginator>
    </mat-card-content>
</mat-card>
