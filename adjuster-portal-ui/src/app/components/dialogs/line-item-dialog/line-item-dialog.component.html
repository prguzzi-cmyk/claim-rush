<h2 mat-dialog-title>{{ title }}</h2>

<div mat-dialog-content>
  <form [formGroup]="lineItemForm">
    <mat-form-field appearance="outline" class="field-full">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description" placeholder="e.g. Drywall repair" />
      <mat-error *ngIf="lineItemForm.get('description')?.hasError('required')">
        Description is required
      </mat-error>
    </mat-form-field>

    <div class="dialog-form-row">
      <mat-form-field appearance="outline" class="field-qty">
        <mat-label>Quantity</mat-label>
        <input matInput type="number" formControlName="quantity" />
        <mat-error *ngIf="lineItemForm.get('quantity')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="lineItemForm.get('quantity')?.hasError('min')">Must be > 0</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="field-unit">
        <mat-label>Unit</mat-label>
        <mat-select formControlName="unit">
          <mat-option *ngFor="let u of unitOptions" [value]="u">{{ u }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="field-price">
        <mat-label>Unit Price</mat-label>
        <span matPrefix>$&nbsp;</span>
        <input matInput type="number" formControlName="unitPrice" />
        <mat-error *ngIf="lineItemForm.get('unitPrice')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="lineItemForm.get('unitPrice')?.hasError('min')">Must be >= 0</mat-error>
      </mat-form-field>
    </div>

    <div class="total-display">
      Total: <strong>{{ getTotal() | currency }}</strong>
    </div>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" type="button"
    [disabled]="lineItemForm.invalid"
    (click)="submit()">
    {{ data.type === 'edit' ? 'Update Item' : 'Add Item' }}
  </button>
</div>
