<h2 mat-dialog-title>Upload multiple files</h2>

<div *ngIf="action == 'add'" mat-dialog-content>
    <div class="row">
        <div class="col-8">
            <label class="btn btn-default p-0">
                <input type="file" multiple (change)="selectFiles($event)" />
            </label>
        </div>
    </div>

    <div *ngFor="let progressInfo of progressInfos" class="mb-2">
        <span>{{ progressInfo.fileName }}</span>
        <div class="progress">
            <div
                class="progress-bar progress-bar-info"
                role="progressbar"
                attr.aria-valuenow="{{ progressInfo.value }}"
                aria-valuemin="0"
                aria-valuemax="100"
                [ngStyle]="{ width: progressInfo.value + '%' }">
                {{ progressInfo.value }}%
            </div>
        </div>
    </div>

    <div *ngIf="message.length" class="alert alert-secondary my-3" role="alert">
        <ul *ngFor="let msg of message; let i = index">
            <li>{{ msg }}</li>
        </ul>
    </div>
</div>

<div mat-dialog-actions>
    <button
        mat-raised-button
        color="primary"
        (click)="uploadFiles()"
        [disabled]="fileUploadFormDisabled || !numberOfFiles"
        *ngIf="action == 'add'">
        <div class="spinner-container">
            <mat-spinner
                diameter="25"
                *ngIf="fileUploadFormDisabled"></mat-spinner>
        </div>
        Upload files
    </button>

    <a
        mat-raised-button
        *ngIf="action == 'view'"
        color="primary"
        href="{{ claimFile?.path }}"
        target="_blank"
        >Download</a
    >
    <button color="accent" mat-raised-button mat-dialog-close>Close</button>
</div>
