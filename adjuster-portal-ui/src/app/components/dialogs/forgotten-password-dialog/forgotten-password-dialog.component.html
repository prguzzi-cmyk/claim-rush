<h1 mat-dialog-title>Reset password</h1>

<div mat-dialog-content>
    <form [formGroup]="passwordResetForm" class="password-reset-form">
        <mat-form-field>
            <input matInput placeholder="Email address" formControlName="email" name="email" type="email" required>
        </mat-form-field>
    </form>
</div>

<div mat-dialog-actions>
    <button mat-raised-button (click)="requestPasswordReset()" color="primary" [disabled]="!passwordResetForm.valid || resetPasswordDisabled">
        <div class="spinner-container"><mat-spinner diameter="25" *ngIf="resetPasswordDisabled"></mat-spinner></div>
        Reset password
    </button>
    <button mat-button mat-dialog-close>Cancel</button>
</div>
