<h2 mat-dialog-title>Attach Policy from Vault</h2>

<mat-dialog-content>
  <div class="search-row">
    <mat-form-field appearance="outline">
      <mat-label>Carrier</mat-label>
      <input matInput [(ngModel)]="searchCarrier" (keyup.enter)="search()" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Policy Number</mat-label>
      <input matInput [(ngModel)]="searchPolicyNumber" (keyup.enter)="search()" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Insured Name</mat-label>
      <input matInput [(ngModel)]="searchInsuredName" (keyup.enter)="search()" />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="search()">
      <mat-icon>search</mat-icon> Search
    </button>
  </div>

  <div *ngIf="loading" class="loading">Searching...</div>

  <table mat-table [dataSource]="dataSource" *ngIf="!loading && dataSource.data.length">
    <ng-container matColumnDef="file_name">
      <th mat-header-cell *matHeaderCellDef>File</th>
      <td mat-cell *matCellDef="let row">{{ row.file_name }}</td>
    </ng-container>

    <ng-container matColumnDef="carrier">
      <th mat-header-cell *matHeaderCellDef>Carrier</th>
      <td mat-cell *matCellDef="let row">{{ row.carrier || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="policy_number">
      <th mat-header-cell *matHeaderCellDef>Policy #</th>
      <td mat-cell *matCellDef="let row">{{ row.policy_number || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="insured_name">
      <th mat-header-cell *matHeaderCellDef>Insured</th>
      <td mat-cell *matCellDef="let row">{{ row.insured_name || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button mat-raised-button color="primary" (click)="selectPolicy(row)">Select</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="!loading && dataSource.data.length === 0" class="no-results">
    No policies found.
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
</mat-dialog-actions>
