<ng-container *ngIf="type==='add'">
  <h2 mat-dialog-title>
    Add credit
  </h2>
  <div mat-dialog-content>
    <form [formGroup]="accountForm" class="account-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput placeholder="email" type="email" formControlName="email" name="email" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Crediti point</mat-label>
        <input matInput placeholder="credit point" type="number" formControlName="amount" name="amount" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Summary</mat-label>
        <input matInput placeholder="summary" formControlName="summary" name="summary" />
      </mat-form-field>
    </form>
  </div>
  <div mat-dialog-actions>
    <button mat-raised-button color="primary" (click)="handleAddCredit()">
      Add credit
    </button>
    <button color="accent" mat-raised-button mat-dialog-close>Cancel</button>
  </div>
</ng-container>


<ng-container *ngIf="type==='view'">
  <h2 mat-dialog-title>
    <div class="d-flex justify-content-between">
      Credit History
      <mat-icon [mat-dialog-close]="true">close</mat-icon>
    </div>
  </h2>
  <div mat-dialog-content>
    <mat-card-content>
      <div class="mat-table-scroll-container">
        <table mat-table [dataSource]="credits" class="credit-table">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let row; let i = index">{{i+1}}</td>
          </ng-container>

          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Amount</th>
            <td mat-cell *matCellDef="let row">{{row.amount}}</td>
          </ng-container>

          <ng-container matColumnDef="summary">
            <th mat-header-cell *matHeaderCellDef>Summary</th>
            <td mat-cell *matCellDef="let row">{{row.summary}}</td>
          </ng-container>

          <ng-container matColumnDef="created_at">
            <th mat-header-cell *matHeaderCellDef>Created</th>
            <td mat-cell *matCellDef="let row">{{row.created_at|date: 'MMMM dd,
              yyyy'}}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <mat-paginator [style.visibility]="credits.length <= 0 ? 'hidden' : 'visible'" #paginator [length]="totalRecords"
        [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions" (page)="changePage($event)">
      </mat-paginator>
    </mat-card-actions>
  </div>
</ng-container>
