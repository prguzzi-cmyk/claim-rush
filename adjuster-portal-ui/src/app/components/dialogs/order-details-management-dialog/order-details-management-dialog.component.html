<ng-container *ngIf="type==='view'">
    <h2 mat-dialog-title>
        <div class="d-flex justify-content-between">
            Order Details
            <mat-icon [mat-dialog-close]="true">close</mat-icon>
        </div>
    </h2>
    <div mat-dialog-content>
        <mat-card-content>
            <div class="mat-table-scroll-container">
                <table mat-table [dataSource]="order_details" class="order-detail-table">
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef>#</th>
                        <td mat-cell *matCellDef="let row; let i = index">{{i+1}}</td>
                    </ng-container>

                    <ng-container matColumnDef="product_image">
                        <th mat-header-cell *matHeaderCellDef>Product Image</th>
                        <td mat-cell *matCellDef="let row">
                            <img [src]="row.product_image" width="100px" />
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="product_name">
                        <th mat-header-cell *matHeaderCellDef>Product Name</th>
                        <td mat-cell *matCellDef="let row">{{row.product_name}}</td>
                    </ng-container>

                    <ng-container matColumnDef="price">
                        <th mat-header-cell *matHeaderCellDef>Price</th>
                        <td mat-cell *matCellDef="let row">{{row.price}}</td>
                    </ng-container>

                    <ng-container matColumnDef="quantity">
                        <th mat-header-cell *matHeaderCellDef>Quantity</th>
                        <td mat-cell *matCellDef="let row">{{row.quantity}}</td>
                    </ng-container>

                    <!-- <ng-container matColumnDef="created_at">
                        <th mat-header-cell *matHeaderCellDef>Created</th>
                        <td mat-cell *matCellDef="let row">{{row.created_at|date: 'MMMM dd,
                            yyyy'}}</td>
                    </ng-container> -->

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
            </div>
        </mat-card-content>
    </div>
</ng-container>

<ng--container *ngIf="type==='edit'">
    <h2 mat-dialog-title>
      Update Order
    </h2>
    <div mat-dialog-content>
      Are you sure you want to set order status to <span style="color:red; font-weight: bold;">Processed</span>?
      <p></p>
    </div>
    <div mat-dialog-actions>
      <button mat-raised-button color="warn" (click)="handleProcessed()">
        Yes, Confirm To Processed
      </button>
      <button color="accent" mat-raised-button mat-dialog-close>Cancel</button>
    </div>
  </ng--container>
