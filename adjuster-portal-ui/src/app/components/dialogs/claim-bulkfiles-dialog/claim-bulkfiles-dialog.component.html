<h2 mat-dialog-title>Upload multiple files</h2>

<div *ngIf="action == 'add'" mat-dialog-content>
    <div class="row">
        <div class="col-8">
            <label class="btn btn-default p-0">
                <input type="file" multiple (change)="selectFiles($event)" />
            </label>
        </div>
    </div>
    <p></p>
    <div *ngFor="let progressInfo of progressInfos" class="mb-1">
        <span  [ngClass]="progressInfo.value == -1 ? 'error' : ''">{{ progressInfo.fileName }} ({{ progressInfo.size | filesize}})</span>
        <div class="progress" *ngIf="progressInfo.value != -1">
            <div
                class="progress-bar progress-bar-info"
                role="progressbar"
                attr.aria-valuenow="{{ progressInfo.value }}"
                aria-valuemin="0"
                aria-valuemax="100"
                [ngStyle]="{ width: progressInfo.value + '%' }">
                {{ progressInfo.value }}%
            </div>
        </div>
    </div>

    <div class="d-flex align-items-center mb-3">
        Share with Sales Rep / Client:
        <mat-slide-toggle [(ngModel)]="isShared" color="primary" class="ml-3"></mat-slide-toggle>
    </div>

    <div *ngIf="messageError.length" class="alert error alert-secondary my-3" role="alert">
        <p *ngFor="let msg of messageError; let i = index">
            {{i + 1}} - {{ msg }}
        </p>
    </div>

    <div *ngIf="message.length" class="alert alert-secondary my-3" role="alert">
        <p *ngFor="let msg of message; let i = index">
            {{i +  1}} - {{ msg }}
        </p>
    </div>
</div>

<div mat-dialog-actions>
    <button
        mat-raised-button
        color="primary"
        (click)="uploadFiles()"
        [disabled]="fileUploadFormDisabled || !numberOfFiles"
        *ngIf="action == 'add'">
        <div class="spinner-container">
            <mat-spinner
                diameter="25"
                *ngIf="fileUploadFormDisabled"></mat-spinner>
        </div>
        Upload files
    </button>

    <a
        mat-raised-button
        *ngIf="action == 'view'"
        color="primary"
        href="{{ claimFile?.path }}"
        target="_blank"
        >Download</a
    >
    <button color="accent" mat-raised-button mat-dialog-close>Close</button>
    <ngx-spinner type="ball-scale-multiple"></ngx-spinner>
</div>
