<app-header></app-header>

<section id="hero">
  <section class="section-top text-center">
    <div
      class="container position-relative z-2"
      data-aos="fade-up"
      data-aos-delay="100"
    >
      <div class="row justify-content-center">
        <div class="col-xs-12 col-lg-8 col-xxl-6">
          <h1 class="title">
            <span>Welcome To</span>
            ClaimsOS
          </h1>

          <p class="sub-title">
            Empowering you to maximize your insurance claims with precision and
            ease through our portal.
          </p>

          <a href="#login" class="sign-in-btn sign-in-btn-lg">Sign In</a>
        </div>
        <!-- <div class="col-xs-12 col-lg-5">
        <dotlottie-player
          src="https://lottie.host/40968112-576d-4c96-8f1f-3712d8c443a7/BQmobZk3nV.json"
          background="transparent"
          speed="1"
          style="width: 100%; height: 350px"
          loop
          autoplay
        ></dotlottie-player>
      </div> -->
      </div>
    </div>
  </section>

  <section class="section-bottom">
    <div class="container">
      <section class="section-xl d-none d-xl-block p-0">
        <div class="row justify-content-between">
          <div class="portal-feature-col">
            <app-portal-feature
              *ngFor="let portalFeature of getFilteredPortalFeatures(0, 2)"
              [portalFeature]="portalFeature"
              screenSize="xl"
            ></app-portal-feature>
          </div>

          <div class="portal-col">
            <div class="portal">
              <div #portalCircle class="portal-circle circle-one"></div>
              <div class="portal-circle circle-two">
                <h1 class="title">ClaimsOS</h1>

                <div #portalFeatureCard class="portal-feature-card">
                  <img
                    src="{{ selectedPortalFeature?.imgPath }}"
                    alt="{{ selectedPortalFeature?.name }}"
                    class="card-img"
                  />

                  <p class="card-description">
                    {{ selectedPortalFeature?.description }}
                  </p>
                </div>
              </div>
            </div>
          </div>

          <div class="portal-feature-col">
            <app-portal-feature
              *ngFor="let portalFeature of getFilteredPortalFeatures(3, 5)"
              [portalFeature]="portalFeature"
              screenSize="xl"
            ></app-portal-feature>
          </div>
        </div>
      </section>

      <section class="section-xs d-block d-xl-none p-0">
        <h2 class="title">Features</h2>

        <div class="row">
          <app-portal-feature
            *ngFor="let portalFeature of portalFeatures"
            [portalFeature]="portalFeature"
            screenSize="xs"
            class="col-lg-6"
          ></app-portal-feature>
        </div>
      </section>
    </div>
  </section>
</section>

<app-footer></app-footer>
