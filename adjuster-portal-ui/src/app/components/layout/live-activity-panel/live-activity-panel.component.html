<ng-container *ngIf="!hidden">

  <!-- Backdrop -->
  <div style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:3000;transition:opacity 0.3s ease;"
       [style.opacity]="drawerOpen ? '1' : '0'"
       [style.pointer-events]="drawerOpen ? 'auto' : 'none'"
       [style.background]="drawerOpen ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0)'"
       (click)="closeDrawer()"></div>

  <!-- Drawer -->
  <div style="position:fixed;top:56px;right:0;width:340px;max-width:340px;max-height:calc(100vh - 72px);background:linear-gradient(180deg,#0c1120 0%,#111827 100%);box-shadow:-4px 0 20px rgba(0,0,0,0.4);border-left:1px solid rgba(99,102,241,0.15);border-radius:0 0 0 12px;z-index:3001;display:flex;flex-direction:column;overflow:hidden;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);"
       [style.transform]="drawerOpen ? 'translateX(0)' : 'translateX(100%)'">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:rgba(0,0,0,0.25);">
      <div style="width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.4);flex-shrink:0;"></div>
      <span style="color:#e2e8f0;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;">Live Activity</span>
      <span style="color:#475569;font-size:11px;">({{ items.length }})</span>
      <button style="margin-left:auto;background:rgba(255,255,255,0.06);border:none;border-radius:6px;width:26px;height:26px;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;"
              (click)="closeDrawer()">
        <mat-icon style="font-size:15px;width:15px;height:15px;">close</mat-icon>
      </button>
    </div>

    <!-- Event feed -->
    <div style="overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;">
      <div *ngFor="let item of items"
           style="padding:12px;margin-bottom:8px;border-radius:8px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);cursor:pointer;"
           (click)="onClick(item)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
          <mat-icon style="font-size:16px;width:16px;height:16px;"
                    [style.color]="getIconColor(item.eventType)">{{ item.icon }}</mat-icon>
          <span style="font-size:12px;font-weight:700;line-height:1.3;"
                [style.color]="getIconColor(item.eventType)">{{ item.label }}</span>
        </div>
        <div *ngIf="item.sublabel" style="color:#94a3b8;font-size:11px;font-weight:500;padding-left:24px;">{{ item.sublabel }}</div>
        <div style="color:#475569;font-size:9px;padding-left:24px;margin-top:4px;font-weight:500;">{{ getTimeAgo(item.timestamp) }}</div>
      </div>

      <!-- Empty state -->
      <div *ngIf="items.length === 0"
           style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;gap:8px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.3);"></div>
        <span style="color:#475569;font-size:12px;font-style:italic;">No live activity yet</span>
      </div>
    </div>
  </div>

</ng-container>
