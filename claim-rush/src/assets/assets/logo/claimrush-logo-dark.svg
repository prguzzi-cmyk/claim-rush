<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" fill="none">
  <defs>
    <!-- Core gradient — intensified -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="1"/>
      <stop offset="40%" stop-color="#A855F7" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#2A70D0"/>
    </linearGradient>
    <!-- Signal gradients -->
    <linearGradient id="signalL" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="signalR" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#2A70D0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2A70D0" stop-opacity="0"/>
    </linearGradient>
    <!-- Sharper glow filters -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="coreBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- === ICON: Central AI Core — scaled up ~12% (centered at x=130, y=130) === -->
  <g transform="translate(130, 130) scale(1.12)">

    <!-- Ambient glow — tighter -->
    <circle cx="0" cy="0" r="50" fill="url(#coreGlow)" opacity="0.4"/>

    <!-- Outer orbital ring -->
    <circle cx="0" cy="0" r="48" stroke="url(#ringGrad)" stroke-width="1.2" fill="none" opacity="0.35"/>

    <!-- Hexagonal outer frame -->
    <polygon
      points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21"
      stroke="url(#ringGrad)" stroke-width="1.4" fill="none" opacity="0.55"
      filter="url(#glow)"
    />

    <!-- Inner hexagonal frame (rotated 30deg) -->
    <polygon
      points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14"
      stroke="#A855F7" stroke-width="1" fill="none" opacity="0.4"
      transform="rotate(30)"
    />

    <!-- Signal lines — left -->
    <line x1="-36" y1="-21" x2="-62" y2="-36" stroke="url(#signalL)" stroke-width="1.1" opacity="0.65"/>
    <line x1="-36" y1="0" x2="-68" y2="0" stroke="url(#signalL)" stroke-width="1.1" opacity="0.55"/>
    <line x1="-36" y1="21" x2="-62" y2="36" stroke="url(#signalL)" stroke-width="1.1" opacity="0.65"/>

    <!-- Signal lines — right -->
    <line x1="36" y1="-21" x2="62" y2="-36" stroke="url(#signalR)" stroke-width="1.1" opacity="0.65"/>
    <line x1="36" y1="0" x2="68" y2="0" stroke="url(#signalR)" stroke-width="1.1" opacity="0.55"/>
    <line x1="36" y1="21" x2="62" y2="36" stroke="url(#signalR)" stroke-width="1.1" opacity="0.65"/>

    <!-- Signal lines — top/bottom -->
    <line x1="0" y1="-42" x2="0" y2="-60" stroke="#A855F7" stroke-width="1" opacity="0.45"/>
    <line x1="0" y1="42" x2="0" y2="60" stroke="#6366F1" stroke-width="1" opacity="0.45"/>

    <!-- Signal endpoint nodes -->
    <circle cx="-62" cy="-36" r="2.2" fill="#A855F7" opacity="0.75"/>
    <circle cx="-68" cy="0" r="2.2" fill="#A855F7" opacity="0.65"/>
    <circle cx="-62" cy="36" r="2.2" fill="#A855F7" opacity="0.75"/>
    <circle cx="62" cy="-36" r="2.2" fill="#2A70D0" opacity="0.75"/>
    <circle cx="68" cy="0" r="2.2" fill="#2A70D0" opacity="0.65"/>
    <circle cx="62" cy="36" r="2.2" fill="#2A70D0" opacity="0.75"/>
    <circle cx="0" cy="-60" r="2" fill="#A855F7" opacity="0.55"/>
    <circle cx="0" cy="60" r="2" fill="#6366F1" opacity="0.55"/>

    <!-- Hexagon vertex nodes -->
    <circle cx="0" cy="-42" r="2.8" fill="#A855F7" filter="url(#glow)"/>
    <circle cx="36.4" cy="-21" r="2.8" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="36.4" cy="21" r="2.8" fill="#6366F1" filter="url(#glow)"/>
    <circle cx="0" cy="42" r="2.8" fill="#6366F1" filter="url(#glow)"/>
    <circle cx="-36.4" cy="21" r="2.8" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="-36.4" cy="-21" r="2.8" fill="#A855F7" filter="url(#glow)"/>

    <!-- Central core — outer ring (brighter) -->
    <circle cx="0" cy="0" r="14" stroke="#B87CFF" stroke-width="1.8" fill="none" filter="url(#glow)" opacity="0.9"/>

    <!-- Central core — intensified fills -->
    <circle cx="0" cy="0" r="9" fill="#A855F7" opacity="0.2"/>
    <circle cx="0" cy="0" r="6" fill="#B87CFF" opacity="0.55" filter="url(#coreBloom)"/>
    <circle cx="0" cy="0" r="3" fill="#F3E8FF"/>
    <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" opacity="0.9"/>

    <!-- Cross-hair lines -->
    <line x1="-14" y1="0" x2="-8" y2="0" stroke="#B87CFF" stroke-width="0.9" opacity="0.7"/>
    <line x1="8" y1="0" x2="14" y2="0" stroke="#B87CFF" stroke-width="0.9" opacity="0.7"/>
    <line x1="0" y1="-14" x2="0" y2="-8" stroke="#B87CFF" stroke-width="0.9" opacity="0.7"/>
    <line x1="0" y1="8" x2="0" y2="14" stroke="#B87CFF" stroke-width="0.9" opacity="0.7"/>

  </g>

  <!-- === WORDMARK === -->
  <g transform="translate(232, 110)">
    <!-- CLAIM (light weight) -->
    <text
      x="0" y="30"
      font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-weight="200"
      font-size="52"
      letter-spacing="1.2"
      fill="#F4F0E8"
    >CLAIM</text>
    <!-- RUSH (heavier weight) -->
    <text
      x="150" y="30"
      font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-weight="600"
      font-size="52"
      letter-spacing="1.2"
      fill="#F4F0E8"
    >RUSH</text>
    <!-- TM -->
    <text
      x="296" y="-2"
      font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-weight="300"
      font-size="11"
      fill="#5A6880"
      letter-spacing="1"
    >TM</text>
    <!-- Tagline -->
    <text
      x="1" y="54"
      font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-weight="300"
      font-size="10.5"
      letter-spacing="2.8"
      fill="#5A6880"
    >CLAIM INTELLIGENCE ENGINE</text>
    <!-- TM on tagline -->
    <text
      x="260" y="54"
      font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-weight="300"
      font-size="7"
      fill="#5A6880"
      letter-spacing="0.5"
    >TM</text>
  </g>

  <!-- Accent line under wordmark -->
  <line x1="234" y1="172" x2="330" y2="172" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3"/>
</svg>
